{% extends "index.html" %}
{% block title %}
<title>profile</title>
{% endblock title %}
{% block head_tags %}
<script src="{{ url_for('static', filename='script/profile_settings.js') }}" type="text/javascript"></script>
{% endblock head_tags %}
{% block content %}
<a href="{{ url_for('home') }}"><img class="logo-pic" src="{{url_for('static', filename='img/logo/logo-white.png')}}" alt="GAINS"></a>
<div class="profile">
    <details id="profile-menu-btn">
        <summary>
            <img class="profile-pic" src="{{url_for('static', filename='img/icons/64x64profile.png')}}" alt="profile">
        </summary>
            {% include "snippets/profile_menu.html" %}
    </details>
</div>
<a class="backbutton" href="{{ url_for('home') }}"> ❮ Profil</a>

<div class="profile-content">


    DIE PROFIL-SEITE IST NOCH IN BEARBEITUNG UND FUNKTIONIERT NICHT KORREKT! <br><br>


    <button id="changeLanguage">Sprache ändern</button>
    <button id="changeProfilePic">Profilbild ändern</button>
    <button id="changeUsernameBtn">Benutzernamen ändern</button>
    <button id="changePasswordBtn">Passwort ändern</button>
    <button id="deleteAccountBtn">Account Löschen</button>

    <dialog id="change-user-name-dialog">
        <form action="" method="post">
            <input type="hidden" value="change_username" name="action" />
            <input type="text" placeholder="Neuer Benutzername" name="new_username" /><br>
            <input type="reset" value="Abbrechen" />
            <input type="submit" value="Benutzernamen ändern" />
        </form>
    </dialog>
</div>
{% endblock content %}
